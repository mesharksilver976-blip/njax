<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>jax ai</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    height:100vh;
    background:#f1f1f1;
    transition:0.3s;
}

/* DARK MODE */
.dark{
    background:#111;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#1e1e1e;
    color:white;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:30px;
}

.menu button{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.menu button:hover{
    background:#555;
}

.theme-btn{
    background:#007bff !important;
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar{
    background:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
}

.dark .topbar{
    background:#1b1b1b;
    border-color:#333;
}

.search{
    width:300px;
    padding:12px;
    border-radius:30px;
    border:1px solid #ccc;
    outline:none;
}

/* CHAT AREA */
.chat-area{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:70%;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    line-height:1.5;
}

.user{
    background:#007bff;
    color:white;
    margin-left:auto;
}

.ai{
    background:white;
    color:black;
}

.dark .ai{
    background:#222;
    color:white;
}

/* INPUT */
.bottom{
    padding:15px;
    background:white;
    display:flex;
    gap:10px;
    border-top:1px solid #ddd;
}

.dark .bottom{
    background:#1b1b1b;
    border-color:#333;
}

.message-input{
    flex:1;
    padding:15px;
    border-radius:30px;
    border:1px solid #ccc;
    outline:none;
}

.send-btn{
    width:60px;
    border:none;
    border-radius:50%;
    background:#007bff;
    color:white;
    font-size:22px;
    cursor:pointer;
}

/* LOGIN BOX */
.login-box{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    width:300px;
    display:none;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.dark .login-box{
    background:#222;
    color:white;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body id="body">

<!-- SIDEBAR -->
<div class="sidebar">

    <div>
        <div class="logo">🤖 My AI</div>

        <div class="menu">
            <button onclick="newChat()">➕ New Chat</button>
            <button>➡ Send Arrow</button>
            <button>⚙ Settings</button>
            <button onclick="openLogin()">🔐 Login</button>
        </div>
    </div>

    <button class="theme-btn" onclick="toggleTheme()">🌙 Change Theme</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="topbar">
        <input type="text" class="search" placeholder="🔍 Search chats...">

        <h3 id="username">Guest</h3>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">

        <div class="message ai">
            Hello 👋 Welcome to My AI Assistant!
        </div>

    </div>

    <!-- INPUT -->
    <div class="bottom">
        <input 
            type="text" 
            class="message-input" 
            id="messageInput"
            placeholder="Type message..."
        >

        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>

/* FAKE DATABASE */
let fakeDatabase = {
    users: [
        {
            username:"admin",
            password:"1234"
        },
        {
            username:"user",
            password:"0000"
        }
    ]
};

/* SEND MESSAGE */
function sendMessage(){

    let input = document.getElementById("messageInput");
    let chatArea = document.getElementById("chatArea");

    if(input.value.trim() === ""){
        return;
    }

    // USER MESSAGE
    let userMsg = document.createElement("div");
    userMsg.classList.add("message","user");
    userMsg.innerText = input.value;

    chatArea.appendChild(userMsg);

    // AI REPLY
    setTimeout(() => {

        let aiMsg = document.createElement("div");
        aiMsg.classList.add("message","ai");

        aiMsg.innerText = "AI Response: " + input.value;

        chatArea.appendChild(aiMsg);

        chatArea.scrollTop = chatArea.scrollHeight;

    },700);

    input.value = "";

    chatArea.scrollTop = chatArea.scrollHeight;
}

/* ENTER KEY */
document.getElementById("messageInput")
.addEventListener("keypress", function(e){

    if(e.key === "Enter"){
        sendMessage();
    }
});

/* NEW CHAT */
function newChat(){

    let chatArea = document.getElementById("chatArea");

    chatArea.innerHTML = `
        <div class="message ai">
            New chat started 🚀
        </div>
    `;
}

/* THEME */
function toggleTheme(){
    document.getElementById("body").classList.toggle("dark");
}

/* LOGIN */
function openLogin(){

    document.getElementById("loginBox").style.display = "block";
}

/* FAKE LOGIN SYSTEM */
function login(){

    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let found = fakeDatabase.users.find(u =>
        u.username === user &&
        u.password === pass
    );

    if(found){

        alert("Login Successful ✅");

        document.getElementById("username").innerText = user;

        document.getElementById("loginBox").style.display = "none";

    }else{

        alert("Wrong Username or Password ❌");
    }
}

</script>

</body>
</html>
